<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#6E2A2A"/>
  <!-- Trident, built as filled shapes for cross-renderer robustness -->
  <g fill="#F1EDE4">
    <!-- center prong: tip + bar -->
    <path d="M32 6 L36.6 15 L33.4 15 L33.4 27 L30.6 27 L30.6 15 L27.4 15 Z"/>
    <!-- left prong -->
    <path d="M20 10 L24.6 19 L21.4 19 L21.4 27 L18.6 27 L18.6 19 L15.4 19 Z"/>
    <!-- right prong -->
    <path d="M44 10 L48.6 19 L45.4 19 L45.4 27 L42.6 27 L42.6 19 L39.4 19 Z"/>
    <!-- crossbar connecting all three prongs -->
    <rect x="15" y="27" width="34" height="3.6"/>
    <!-- shaft -->
    <rect x="30.2" y="30.6" width="3.6" height="22"/>
    <!-- base boss -->
    <circle cx="32" cy="54.5" r="2.8"/>
  </g>
</svg>
